<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BioLudo — Jogo de Tabuleiro Educacional</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- TELA INICIAL -->
  <div id="screen-intro" class="screen active">
    <div class="intro-container">
      <h1 class="game-title">BioLudo</h1>
      <p class="game-subtitle">Jogo de Tabuleiro Educacional</p>
      
      <div class="setup-section">
        <label class="setup-label">Número de Jogadores:</label>
        <div class="player-count-buttons">
          <button class="btn-count active" data-count="2">2</button>
          <button class="btn-count" data-count="3">3</button>
          <button class="btn-count" data-count="4">4</button>
        </div>
      </div>

      <div class="button-group">
        <button id="btn-start-game" class="btn-primary">Iniciar Jogo</button>
      </div>
    </div>
  </div>

  <!-- TELA DO JOGO -->
  <div id="screen-game" class="screen">
    <div class="game-layout">
      
      <!-- Painel Esquerdo: Jogadores -->
      <div class="players-panel">
        <h3 class="panel-title">Jogadores</h3>
        <div id="players-list" class="players-list"></div>
      </div>

      <!-- Centro: Tabuleiro -->
      <div class="game-center">
        <div class="board-wrapper" style="background-image: url('tabuleiro.png');">
          <div id="pawns-container"></div>
        </div>
      </div>

      <!-- Painel Direito: Controles -->
      <div class="control-panel">
        
        <!-- Informações do Jogador Atual -->
        <div class="current-player-info">
          <div class="info-label">Sua Vez</div>
          <div class="player-name" id="current-player-name">Jogador 1</div>
        </div>

        <!-- Dado -->
        <div class="dice-section">
          <div class="dice" id="dice-display">
            <!-- O dado 3D será injetado aqui via JS -->
          </div>
          <button id="btn-roll-dice" class="btn-primary">Rolar Dado</button>
        </div>

        <!-- Seleção de Peão -->
        <div id="pawn-selection" class="pawn-selection hidden">
          <p>Escolha um peão:</p>
          <div id="pawn-buttons-container"></div>
        </div>

        <!-- Log de Ações -->
        <div class="action-log" id="action-log">Bem-vindo ao BioLudo!</div>

        <button onclick="location.reload()" class="btn-secondary">Menu</button>
      </div>
    </div>
  </div>

  <!-- MODAL DE PERGUNTA -->
  <div id="question-modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="question-header">
        <span class="question-level" id="q-level">Nível 1</span>
        <span class="question-type" id="q-type">Múltipla Escolha</span>
      </div>
      <div class="question-text" id="q-text"></div>
      
      <!-- Múltipla Escolha -->
      <div id="q-multiple" class="question-section hidden">
        <div id="q-options"></div>
      </div>

      <!-- Verdadeiro/Falso -->
      <div id="q-truefalse" class="question-section hidden">
        <div class="tf-buttons">
          <button class="btn-tf" data-answer="true">Verdadeiro</button>
          <button class="btn-tf" data-answer="false">Falso</button>
        </div>
      </div>

      <!-- Ordenar Sequência -->
      <div id="q-order" class="question-section hidden">
        <p class="order-hint">Clique nos itens para ordenar (Simulação):</p>
        <div id="q-order-items" class="order-items"></div>
        <button id="btn-confirm-order" class="btn-primary">Confirmar Ordem</button>
      </div>

      <!-- Feedback -->
      <div id="q-feedback" class="question-feedback hidden"></div>
      <button id="btn-continue-game" class="btn-primary hidden">Continuar</button>
    </div>
  </div>

  <script src="sounds.js"></script>
  <script src="questions.js"></script>
  <script src="ludo-game-fixed.js"></script>
</body>
</html>
